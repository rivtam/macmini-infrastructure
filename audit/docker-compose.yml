services:
  # Audit Log Processor - parses and enriches audit logs
  audit-processor:
    image: grafana/promtail:latest
    container_name: infra_audit_processor
    restart: unless-stopped
    volumes:
      - ./config/audit-promtail.yml:/etc/promtail/promtail-config.yml:ro
      - ./logs:/var/log/audit:rw
      - ../vault/logs:/var/log/vault:ro
      - ../nginx/logs:/var/log/nginx:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - infra_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # Audit Exporter - exposes audit metrics for Prometheus
  audit-exporter:
    image: prom/pushgateway:latest
    container_name: infra_audit_exporter
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - infra_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

networks:
  infra_network:
    name: infra_network
    external: true
