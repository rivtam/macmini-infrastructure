server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Vault audit logs
  - job_name: vault-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: vault
          log_type: audit
          __path__: /var/log/vault/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            type: type
            auth_display_name: auth.display_name
            auth_type: auth.token_type
            request_path: request.path
            request_operation: request.operation
            response_status: response.error
      - labels:
          type:
          auth_type:
          request_operation:
      - timestamp:
          source: time
          format: RFC3339

  # Nginx access logs (audit perspective)
  - job_name: nginx-access-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: access_audit
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[\d\.]+) - (?P<remote_user>[\w\-]+) \[(?P<timestamp>[^\]]+)\] "(?P<method>\w+) (?P<path>[^\s]+) [^"]+" (?P<status>\d+) (?P<bytes>\d+) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'
      - labels:
          method:
          status:
          remote_user:
      - timestamp:
          source: timestamp
          format: 02/Jan/2006:15:04:05 -0700

  # System authentication logs
  - job_name: system-auth-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          log_type: auth_audit
          __path__: /var/log/host/auth.log
    pipeline_stages:
      - match:
          selector: '{log_type="auth_audit"}'
          stages:
            - regex:
                expression: '(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+) (?P<hostname>\S+) (?P<process>\S+): (?P<message>.*)'
            - labels:
                process:
            - timestamp:
                source: timestamp
                format: Jan 2 15:04:05

  # PostgreSQL audit logs
  - job_name: postgres-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgres
          log_type: audit
          __path__: /var/log/audit/postgres-audit.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            user: user
            database: database
            query_type: query_type
            query: query
            client_ip: client_ip
      - labels:
          user:
          database:
          query_type:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Application audit events
  - job_name: application-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: application
          log_type: audit
          __path__: /var/log/audit/app-audit.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event_type: event_type
            user_id: user_id
            action: action
            resource: resource
            result: result
            ip_address: ip_address
      - labels:
          event_type:
          action:
          result:
      - timestamp:
          source: timestamp
          format: RFC3339
