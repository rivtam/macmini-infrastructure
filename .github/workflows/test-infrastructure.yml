name: Test Infrastructure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      nginx: ${{ steps.filter.outputs.nginx }}
      databases: ${{ steps.filter.outputs.databases }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nginx:
              - 'nginx/**'
            databases:
              - 'databases/**'
            monitoring:
              - 'monitoring/**'

  # ─── Test Nginx Configuration ─────────────────────────────────────────────
  test-nginx:
    needs: changes
    if: needs.changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test nginx configuration syntax
        run: |
          cd nginx
          docker compose --profile test run --rm nginx-test

  # ─── Test Database Services ───────────────────────────────────────────────
  test-databases:
    needs: changes
    if: needs.changes.outputs.databases == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create network
        run: docker network create infra_network

      - name: Start database services
        run: |
          cd databases
          docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c 'until docker exec infra_postgres pg_isready -U postgres; do sleep 2; done'

      - name: Wait for Redis
        run: |
          timeout 60 bash -c 'until docker exec infra_redis redis-cli ping | grep -q PONG; do sleep 2; done'

      - name: Test PostgreSQL connectivity
        run: |
          docker exec infra_postgres psql -U postgres -c "SELECT version();"
          docker exec infra_postgres psql -U postgres -l

      - name: Test Redis connectivity
        run: |
          docker exec infra_redis redis-cli ping
          docker exec infra_redis redis-cli SET test_key "test_value"
          docker exec infra_redis redis-cli GET test_key

      - name: Show container logs on failure
        if: failure()
        run: |
          cd databases
          docker compose logs

      - name: Cleanup
        if: always()
        run: |
          cd databases
          docker compose down -v

  # ─── Test Monitoring Stack ────────────────────────────────────────────────
  test-monitoring:
    needs: changes
    if: needs.changes.outputs.monitoring == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create network
        run: docker network create infra_network

      - name: Start monitoring services
        run: |
          cd monitoring
          docker compose up -d

      - name: Wait for services to start
        run: sleep 15

      - name: Test Prometheus
        run: |
          curl -f http://localhost:9090/-/healthy
          curl -f http://localhost:9090/api/v1/targets

      - name: Test Grafana
        run: |
          curl -f http://localhost:3000/api/health

      - name: Test Node Exporter
        run: |
          curl -f http://localhost:9100/metrics

      - name: Show container logs on failure
        if: failure()
        run: |
          cd monitoring
          docker compose logs

      - name: Cleanup
        if: always()
        run: |
          cd monitoring
          docker compose down -v

  # ─── Integration Test - Full Stack ────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: [test-nginx, test-databases, test-monitoring]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Create network
        run: docker network create infra_network

      - name: Start all services
        run: |
          cd databases && docker compose up -d
          sleep 10
          cd ../monitoring && docker compose up -d
          sleep 10
          cd ../nginx && docker compose up -d
          sleep 5

      - name: Run health checks
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh

      - name: Show service status
        run: |
          docker ps --filter "name=infra_"

      - name: Test nginx routing
        run: |
          curl -f http://localhost/healthz

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Database Logs ==="
          cd databases && docker compose logs
          echo "=== Monitoring Logs ==="
          cd ../monitoring && docker compose logs
          echo "=== Nginx Logs ==="
          cd ../nginx && docker compose logs

      - name: Cleanup
        if: always()
        run: |
          cd nginx && docker compose down -v || true
          cd ../monitoring && docker compose down -v || true
          cd ../databases && docker compose down -v || true
          docker network rm infra_network || true
