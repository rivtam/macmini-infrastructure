groups:
  - name: ssl_certificate_alerts
    interval: 1h
    rules:
      # Alert if certificate expires in less than 7 days
      - alert: SSLCertificateExpiringSoon
        expr: (ssl_cert_not_after - time()) / 86400 < 7
        for: 1h
        labels:
          severity: warning
          category: security
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"

      # Alert if certificate expires in less than 2 days
      - alert: SSLCertificateExpiringCritical
        expr: (ssl_cert_not_after - time()) / 86400 < 2
        for: 30m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SSL certificate expiring very soon!"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}. IMMEDIATE ACTION REQUIRED!"

      # Alert if certificate has expired
      - alert: SSLCertificateExpired
        expr: ssl_cert_not_after - time() < 0
        for: 5m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SSL certificate has expired!"
          description: "SSL certificate for {{ $labels.instance }} has expired!"
