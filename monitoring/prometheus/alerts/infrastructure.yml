groups:
  - name: infrastructure_alerts
    interval: 30s
    rules:
      # ===== Container Health Alerts =====
      - alert: ContainerDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Container {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Container {{ $labels.name }} CPU usage is high"
          description: "Container {{ $labels.name }} CPU usage is above 80% (current value: {{ $value }}%)"

      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Container {{ $labels.name }} memory usage is high"
          description: "Container {{ $labels.name }} memory usage is above 90% (current value: {{ $value }}%)"

      # ===== Database Alerts =====
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL has been down for more than 1 minute."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute."

      # ===== Host System Alerts =====
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Host CPU usage is high"
          description: "CPU usage on {{ $labels.instance }} is above 85% (current value: {{ $value }}%)"

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Host memory usage is high"
          description: "Memory usage on {{ $labels.instance }} is above 90% (current value: {{ $value }}%)"

      - alert: HostDiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs",fstype!="devtmpfs"} / node_filesystem_size_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Host disk space is running low"
          description: "Disk usage on {{ $labels.instance }} mountpoint {{ $labels.mountpoint }} is above 85% (current value: {{ $value }}%)"

      - alert: HostDiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs",fstype!="devtmpfs"} / node_filesystem_size_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Host disk space is critically low"
          description: "Disk usage on {{ $labels.instance }} mountpoint {{ $labels.mountpoint }} is above 95% (current value: {{ $value }}%)"

      # ===== Network Alerts =====
      - alert: HighNetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) > 10 or rate(node_network_transmit_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "High network errors detected"
          description: "Network interface {{ $labels.device }} on {{ $labels.instance }} is experiencing high error rate ({{ $value }} errors/sec)"

      # ===== Prometheus Self-Monitoring =====
      - alert: PrometheusTargetDown
        expr: up{job!~"node-exporter|cadvisor"} == 0
        for: 3m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Prometheus target is down"
          description: "Prometheus target {{ $labels.job }} on {{ $labels.instance }} has been down for more than 3 minutes."

      - alert: PrometheusTooManyRestarts
        expr: changes(process_start_time_seconds{job="prometheus"}[15m]) > 2
        for: 5m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Prometheus has restarted multiple times"
          description: "Prometheus has restarted {{ $value }} times in the last 15 minutes."

      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus configuration reload has failed. Check the Prometheus logs."

      # ===== Nginx Alerts =====
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
          category: webserver
        annotations:
          summary: "Nginx is down"
          description: "Nginx has been down for more than 1 minute."
