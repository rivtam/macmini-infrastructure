global:
  # How long to wait before sending a notification again if it has already been sent
  resolve_timeout: 5m

  # SMTP configuration for email notifications (optional)
  # Uncomment and configure for email alerts
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alerts@yourdomain.com'
  # smtp_auth_username: 'your-email@gmail.com'
  # smtp_auth_password: 'your-app-password'
  # smtp_require_tls: true

# Templates for notification messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for organizing alerts
route:
  # Default receiver for all alerts
  receiver: 'default-receiver'

  # How long to wait before sending a notification
  group_wait: 30s

  # How long to wait before sending a notification about new alerts
  group_interval: 5m

  # How long to wait before re-sending a notification
  repeat_interval: 4h

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 30s
      repeat_interval: 4h

    # Database alerts - specialized handling
    - match:
        category: database
      receiver: 'database-receiver'
      group_wait: 15s

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # Suppress warning if critical alert is firing for the same instance
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

