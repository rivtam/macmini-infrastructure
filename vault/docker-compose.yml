services:
  vault:
    image: hashicorp/vault:latest
    container_name: infra_vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - ./policies:/vault/policies:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
    command: server
    networks:
      - infra_network
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  vault_data:
    driver: local
  vault_logs:
    driver: local

networks:
  infra_network:
    name: infra_network
    external: true
