# EduHub Application Configuration

upstream eduhub_backend {
    server eduhub_backend:3000;
}

# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name edu-hub.duckdns.org;

    # Health check endpoint
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # ACME challenge for Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name edu-hub.duckdns.org;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/edu-hub.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edu-hub.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Max upload size
    client_max_body_size 10M;

    # Health check endpoint
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # API proxy - forward all /api requests to backend
    location /api/ {
        # Rate limiting for API endpoints
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://eduhub_backend;
        proxy_http_version 1.1;

        # Headers for proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Stricter rate limiting for auth endpoints
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://eduhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend static files
    # SETUP REQUIRED: Mount your frontend build directory as a volume
    # See nginx/README.md "Frontend Static Files" section for setup options:
    # 1. Add volume mount: - /path/to/eduhub/frontend/dist:/usr/share/nginx/html/eduhub:ro
    # 2. Or build custom image with frontend files included
    # 3. Or use shared volume from frontend build container
    location / {
        root /usr/share/nginx/html/eduhub;
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/eduhub;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
