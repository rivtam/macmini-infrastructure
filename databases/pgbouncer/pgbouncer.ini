[databases]
; Database connections
; Format: dbname = host=hostname port=5432 dbname=dbname
eduhub = host=postgres port=5432 dbname=eduhub
blog = host=postgres port=5432 dbname=blog
portfolio = host=postgres port=5432 dbname=portfolio
* = host=postgres port=5432

[pgbouncer]
; Connection pooling mode
; session - most compatible, one server connection per client
; transaction - recommended for most apps, server connection returned after transaction
; statement - most aggressive, connection returned after each statement
pool_mode = transaction

; Listen address
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Administrator users
admin_users = postgres

; Connection limits
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3

; Connection lifetime
server_lifetime = 3600
server_idle_timeout = 600

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Stats
stats_period = 60

; Safety limits
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
idle_transaction_timeout = 0

; TLS settings (optional)
;client_tls_sslmode = disable
;server_tls_sslmode = disable

; DNS
dns_max_ttl = 15
dns_nxdomain_ttl = 15

; Ignore startup parameters
ignore_startup_parameters = extra_float_digits

; Other
max_db_connections = 50
max_user_connections = 50
